<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gomoku MuZero — Console</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: #2d2a26;
    color: #e8e2d6;
  }
  header {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 14px 28px;
    background: #3a352f;
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  header h1 { font-size: 18px; margin: 0; color: #f0e6d2; }
  nav { display: flex; gap: 4px; }
  nav a, nav span {
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 14px;
    text-decoration: none;
    color: #beb4a0;
  }
  nav a:hover { background: #4a4234; color: #e8e2d6; }
  nav .active { background: #c98f45; color: #241d12; font-weight: 700; }
  .tabpane[hidden] { display: none; }
  .tabpane { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; width: 100%; }
  table { border-collapse: collapse; font-size: 13px; width: 100%; }
  th, td { text-align: left; padding: 6px 12px 6px 0; border-bottom: 1px solid #4a4234; }
  th { color: #7d7466; font-weight: 400; font-size: 12px; }
  td button {
    padding: 4px 10px; font-size: 12px; font-weight: 400;
    background: #2d2a26; color: #beb4a0; border: 1px solid #57503f;
  }
  td button:hover { border-color: #e0b06a; color: #e8e2d6; }
  td button.danger:hover { border-color: #e08f8f; color: #e08f8f; }
  .chart { margin-bottom: 8px; }
  .chart h4 { margin: 10px 0 4px; font-size: 12.5px; color: #beb4a0; font-weight: 400; }
  .runpick { display: flex; flex-wrap: wrap; gap: 10px; font-size: 13px; }
  .runpick label { display: flex; gap: 5px; align-items: center; cursor: pointer; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; margin: 6px 0; }
  .legend span::before {
    content: "—"; font-weight: 700; margin-right: 4px;
  }
  #infoBox { font-size: 13px; }
  #infoBox .kv { margin-top: 4px; }
  .confirm-inline { display: inline-flex; gap: 6px; align-items: center; }
  .confirm-inline input {
    padding: 4px 6px; font-size: 12px; width: 180px;
    background: #201d1a; border: 1px solid #7a3b3b; border-radius: 4px;
    color: #e8e2d6;
  }
  .toolrow { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; font-size: 13px; }
  .plotimgs img { max-width: 100%; border-radius: 6px; margin-top: 10px; }
  main {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    padding: 24px 28px;
    align-items: flex-start;
  }
  .card {
    background: #3a352f;
    border-radius: 10px;
    padding: 18px 20px;
    box-shadow: 0 4px 14px rgba(0,0,0,.4);
  }
  .card h2 { margin: 0 0 14px; font-size: 15px; color: #f0e6d2; }
  #statusCard { width: 460px; }
  #optionsCard { flex: 1; min-width: 480px; max-width: 760px; }
  .state {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
  }
  .state.idle     { background: #57503f; }
  .state.running  { background: #3f6d3f; }
  .state.finished { background: #3d5a76; }
  .state.failed   { background: #7a3b3b; }
  #progressBar {
    height: 10px;
    background: #2d2a26;
    border-radius: 5px;
    margin: 12px 0 4px;
    overflow: hidden;
  }
  #progressFill {
    height: 100%;
    width: 0;
    background: #c98f45;
    transition: width .6s;
  }
  .kv { display: grid; grid-template-columns: 170px 1fr; gap: 3px 10px;
        font-size: 13px; margin-top: 10px; }
  .kv span:nth-child(odd) { color: #7d7466; }
  #logTail {
    margin-top: 12px;
    background: #201d1a;
    border-radius: 6px;
    padding: 10px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 11.5px;
    line-height: 1.5;
    max-height: 180px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: #a99f8c;
  }
  form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 22px; }
  form h3 {
    grid-column: 1 / -1;
    margin: 12px 0 0;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #7d7466;
    border-bottom: 1px solid #4a4234;
    padding-bottom: 4px;
  }
  .field label { display: block; font-size: 12.5px; color: #beb4a0; margin-bottom: 3px; }
  .field input, .field select {
    width: 100%;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid #57503f;
    background: #2d2a26;
    color: #e8e2d6;
    font-size: 13.5px;
  }
  .field.checkbox { display: flex; align-items: center; gap: 8px; }
  .field.checkbox input { width: auto; }
  .field.checkbox label { margin: 0; }
  .actions { grid-column: 1 / -1; display: flex; gap: 12px; margin-top: 16px; }
  button {
    padding: 10px 22px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  #startBtn { background: #c98f45; color: #241d12; }
  #startBtn:hover:enabled { background: #e0b06a; }
  #stopBtn { background: #7a3b3b; color: #f0e0e0; display: none; }
  button:disabled { opacity: .45; cursor: default; }
  #message { grid-column: 1 / -1; font-size: 13px; min-height: 18px; }
  #message.error { color: #e08f8f; }
  #message.ok { color: #8fd08f; }
</style>
</head>
<body>
<header>
  <h1>Gomoku &middot; MuZero Console</h1>
  <nav>
    <a href="#" class="tab active" data-tab="train">Train</a>
    <a href="#" class="tab" data-tab="metrics">Metrics</a>
    <a href="#" class="tab" data-tab="storage">Storage</a>
    <a href="/play">Play</a>
  </nav>
</header>
<main>
  <div class="tabpane" id="tab-train">
    <div class="card" id="statusCard">
      <h2>Training status</h2>
      <span class="state idle" id="stateBadge">idle</span>
      <div id="progressBar"><div id="progressFill"></div></div>
      <div id="progressText" style="font-size:13px;color:#beb4a0;"></div>
      <div class="kv" id="statusDetails"></div>
      <div id="logTail" hidden></div>
    </div>
    <div class="card" id="optionsCard">
      <h2>Start a training run</h2>
      <form id="optionsForm" autocomplete="off"></form>
    </div>
  </div>

  <div class="tabpane" id="tab-metrics" hidden>
    <div class="card" style="flex:1;min-width:560px;max-width:900px;">
      <h2>Metrics</h2>
      <div class="runpick" id="runPick"></div>
      <div class="legend" id="chartLegend"></div>
      <div id="charts"></div>
    </div>
    <div class="card" style="width:320px;">
      <h2>External tools</h2>
      <div class="toolrow" id="tbRow">
        <span>TensorBoard:</span>
        <span id="tbState">…</span>
        <button id="tbBtn" type="button">Start</button>
        <a id="tbLink" href="#" target="_blank" hidden>open</a>
      </div>
      <div class="toolrow" style="margin-top:14px;">
        <span>Static plots:</span>
        <select id="plotRun" style="max-width:150px;"></select>
        <button id="plotBtn" type="button">Generate</button>
      </div>
      <div id="toolMsg" style="font-size:12.5px;color:#e08f8f;margin-top:8px;"></div>
      <div class="plotimgs" id="plotImgs"></div>
    </div>
  </div>

  <div class="tabpane" id="tab-storage" hidden>
    <div class="card" style="flex:1;min-width:520px;max-width:760px;">
      <h2>Runs</h2>
      <table id="runsTable"></table>
      <h2 style="margin-top:22px;">Checkpoints</h2>
      <table id="ckptTable"></table>
      <div id="storageMsg" style="font-size:13px;margin-top:10px;"></div>
    </div>
    <div class="card" style="width:380px;" id="infoCard" hidden>
      <h2>Model information</h2>
      <div id="infoBox"></div>
    </div>
  </div>
</main>

<script>
"use strict";
const GROUPS = [
  ["Run", ["run_name", "iterations", "resume", "seed"]],
  ["Game", ["board_size", "win_length"]],
  ["Network", ["hidden_channels", "res_blocks"]],
  ["Search & self-play", ["simulations", "games_per_iteration",
                          "temperature_moves", "self_play_mode"]],
  ["Optimization", ["training_steps", "batch_size", "learning_rate",
                    "value_loss_weight"]],
  ["Replay", ["replay_capacity", "replay_sampling", "no_augment"]],
  ["Evaluation & output", ["evaluation_interval", "evaluation_games",
                           "checkpoint", "training_state", "device",
                           "tensorboard"]],
];
let schema = [];
let stateFiles = [];
let running = false;

const form = document.getElementById("optionsForm");

async function api(path, body) {
  const options = body
    ? { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body) }
    : {};
  const response = await fetch(path, options);
  const data = await response.json();
  if (!response.ok) throw new Error(data.error || "request failed");
  return data;
}

function fieldFor(entry) {
  const wrap = document.createElement("div");
  wrap.className = "field";
  if (entry.kind === "flag") {
    wrap.classList.add("checkbox");
    const input = document.createElement("input");
    input.type = "checkbox";
    input.id = entry.name;
    if (entry.name === "tensorboard") input.checked = true;
    const label = document.createElement("label");
    label.htmlFor = entry.name;
    label.textContent = entry.flag;
    wrap.append(input, label);
    return wrap;
  }
  const label = document.createElement("label");
  label.htmlFor = entry.name;
  label.textContent = entry.flag;
  label.title = entry.help || "";
  let input;
  if (entry.name === "resume") {
    input = document.createElement("select");
    const none = document.createElement("option");
    none.value = ""; none.textContent = "— fresh run —";
    input.appendChild(none);
    for (const name of stateFiles) {
      const option = document.createElement("option");
      option.value = "checkpoints/" + name;
      option.textContent = name;
      input.appendChild(option);
    }
    input.addEventListener("change",
      () => applyResumeConfig(input.value));
  } else if (entry.choices) {
    input = document.createElement("select");
    for (const choice of entry.choices) {
      const option = document.createElement("option");
      option.value = option.textContent = choice;
      if (choice === entry.default) option.selected = true;
      input.appendChild(option);
    }
  } else {
    input = document.createElement("input");
    input.type = entry.kind === "str" ? "text" : "number";
    if (entry.kind === "float") input.step = "any";
    if (entry.default !== null && entry.default !== undefined) {
      input.value = entry.default;
    }
    if (entry.name === "run_name") {
      input.value = "";
      input.placeholder = "auto: run-YYYYMMDD-HHMMSS";
    }
  }
  input.id = entry.name;
  input.title = entry.help || "";
  wrap.append(label, input);
  return wrap;
}

function buildForm() {
  form.replaceChildren();
  const byName = Object.fromEntries(schema.map(e => [e.name, e]));
  for (const [title, names] of GROUPS) {
    const heading = document.createElement("h3");
    heading.textContent = title;
    form.appendChild(heading);
    for (const name of names) {
      if (byName[name]) form.appendChild(fieldFor(byName[name]));
    }
  }
  const actions = document.createElement("div");
  actions.className = "actions";
  actions.innerHTML =
    '<button type="submit" id="startBtn">Start training</button>' +
    '<button type="button" id="stopBtn">Stop (saves state)</button>';
  form.appendChild(actions);
  const message = document.createElement("div");
  message.id = "message";
  form.appendChild(message);
  document.getElementById("stopBtn").addEventListener("click", stopRun);
  form.addEventListener("submit", startRun);
}

function collectOptions() {
  const options = {};
  for (const entry of schema) {
    const input = document.getElementById(entry.name);
    if (!input) continue;
    if (entry.kind === "flag") {
      if (input.checked) options[entry.name] = true;
    } else if (input.value !== "" && input.value !== null) {
      options[entry.name] = input.value;
    }
  }
  return options;
}

function say(text, cls) {
  const message = document.getElementById("message");
  message.textContent = text;
  message.className = cls || "";
}

function resetFormDefaults() {
  for (const entry of schema) {
    const input = document.getElementById(entry.name);
    if (!input || entry.name === "resume") continue;
    if (entry.kind === "flag") {
      input.checked = entry.name === "tensorboard";
    } else if (entry.name === "run_name") {
      input.value = "";
    } else if (entry.default !== null && entry.default !== undefined) {
      input.value = entry.default;
    } else {
      input.value = "";
    }
  }
}

async function applyResumeConfig(statePath) {
  if (!statePath) {
    resetFormDefaults();
    say("Fresh run: form reset to defaults.");
    return;
  }
  const stateName = statePath.split("/").pop();
  try {
    const data = await api(
      "/manager/api/resume-config?state="
      + encodeURIComponent(stateName));
    if (!data.found) {
      say("No run recorded for this state file — review every option "
          + "manually before starting.", "error");
      return;
    }
    let applied = 0;
    for (const [name, value] of Object.entries(data.options)) {
      const input = document.getElementById(name);
      const entry = schema.find(e => e.name === name);
      if (!input || !entry) continue;
      if (entry.kind === "flag") input.checked = Boolean(value);
      else input.value = value;
      applied++;
    }
    say(`Prefilled ${applied} options from run "${data.source_run}". `
        + "Set --iterations (additional) and consider a new seed; "
        + "run name is left blank for a fresh directory.", "ok");
  } catch (error) {
    say("Error: " + error.message, "error");
  }
}

async function startRun(event) {
  event.preventDefault();
  try {
    say("Starting…");
    await api("/manager/api/start", { options: collectOptions() });
    say("Training started.", "ok");
    refreshStatus();
  } catch (error) {
    say("Error: " + error.message, "error");
  }
}

async function stopRun() {
  if (!confirm("Interrupt training? The state saved after the last "
               + "completed iteration is kept, so you can resume."))
    return;
  try {
    await api("/manager/api/stop", {});
    say("Stop signal sent; the run will halt shortly.", "ok");
  } catch (error) {
    say("Error: " + error.message, "error");
  }
}

function renderStatus(status) {
  running = status.state === "running";
  const badge = document.getElementById("stateBadge");
  badge.textContent = status.state;
  badge.className = "state " + status.state;
  document.getElementById("startBtn").disabled = running;
  document.getElementById("stopBtn").style.display =
    running ? "inline-block" : "none";

  const fill = document.getElementById("progressFill");
  const progressText = document.getElementById("progressText");
  if (status.iteration && status.target_iteration) {
    const done = status.iteration - (status.first_iteration - 1);
    const total = status.target_iteration - (status.first_iteration - 1);
    fill.style.width = Math.min(100, 100 * done / total) + "%";
    progressText.textContent =
      `iteration ${status.iteration} of ${status.target_iteration}`
      + (status.resumed_from ? " (resumed)" : "");
  } else {
    fill.style.width = "0";
    progressText.textContent =
      running ? "waiting for the first iteration…" : "";
  }

  const details = document.getElementById("statusDetails");
  details.replaceChildren();
  const rows = [];
  if (status.run_name) rows.push(["run", status.run_name]);
  if (status.latest_metrics) {
    for (const [key, value] of Object.entries(status.latest_metrics)) {
      rows.push([key, typeof value === "number" ? value.toFixed(3) : value]);
    }
  }
  if (status.returncode !== null && status.returncode !== undefined) {
    rows.push(["exit code", status.returncode]);
  }
  for (const [key, value] of rows) {
    const k = document.createElement("span"); k.textContent = key;
    const v = document.createElement("span"); v.textContent = value;
    details.append(k, v);
  }

  const log = document.getElementById("logTail");
  if (status.log_tail && status.log_tail.length) {
    log.hidden = false;
    log.textContent = status.log_tail.join("\n");
    log.scrollTop = log.scrollHeight;
  } else {
    log.hidden = true;
  }
}

async function refreshStatus() {
  try {
    renderStatus(await api("/manager/api/status"));
  } catch (error) { /* transient; retried on the next poll */ }
}

/* ---------- Metrics tab ---------- */
const PALETTE = ["#e0b06a", "#8fd08f", "#7fb3d5", "#e08f8f", "#c39bd3"];
let selectedRuns = [];

function fmt(value) {
  return Math.abs(value) >= 100 ? value.toFixed(0)
    : Math.abs(value) >= 1 ? value.toFixed(2) : value.toFixed(3);
}

function drawChart(title, byRun) {
  const W = 560, H = 150, L = 46, R = 8, T = 8, B = 18;
  let xs = [], ys = [];
  for (const points of Object.values(byRun)) {
    for (const [x, y] of points) { xs.push(x); ys.push(y); }
  }
  if (!xs.length) return "";
  const xmin = Math.min(...xs), xmax = Math.max(...xs);
  let ymin = Math.min(...ys), ymax = Math.max(...ys);
  if (ymin === ymax) { ymin -= 1; ymax += 1; }
  const sx = x => L + (x - xmin) / (xmax - xmin || 1) * (W - L - R);
  const sy = y => T + (ymax - y) / (ymax - ymin) * (H - T - B);
  let body = `<rect width="${W}" height="${H}" fill="#201d1a" rx="6"/>`;
  for (const frac of [0, .5, 1]) {
    const y = T + frac * (H - T - B);
    body += `<line x1="${L}" y1="${y}" x2="${W - R}" y2="${y}"
      stroke="#3a352f"/>`;
  }
  body += `<text x="${L - 6}" y="${T + 10}" text-anchor="end"
    fill="#7d7466" font-size="10">${fmt(ymax)}</text>`;
  body += `<text x="${L - 6}" y="${H - B}" text-anchor="end"
    fill="#7d7466" font-size="10">${fmt(ymin)}</text>`;
  body += `<text x="${L}" y="${H - 4}" fill="#7d7466"
    font-size="10">${xmin}</text>`;
  body += `<text x="${W - R}" y="${H - 4}" text-anchor="end"
    fill="#7d7466" font-size="10">${xmax}</text>`;
  selectedRuns.forEach((run, index) => {
    const points = byRun[run];
    if (!points) return;
    const path = points.map(
      ([x, y], i) => (i ? "L" : "M") + sx(x).toFixed(1) + " "
        + sy(y).toFixed(1)
    ).join("");
    body += `<path d="${path}" fill="none"
      stroke="${PALETTE[index % PALETTE.length]}" stroke-width="1.6"/>`;
  });
  return `<div class="chart"><h4>${title}</h4>
    <svg viewBox="0 0 ${W} ${H}" width="100%">${body}</svg></div>`;
}

async function refreshCharts() {
  if (!selectedRuns.length) {
    document.getElementById("charts").innerHTML =
      '<p style="color:#7d7466;font-size:13px;">Select runs above.</p>';
    document.getElementById("chartLegend").replaceChildren();
    return;
  }
  const data = await api(
    "/manager/api/metrics?runs=" + selectedRuns.join(","));
  const legend = document.getElementById("chartLegend");
  legend.replaceChildren();
  selectedRuns.forEach((run, index) => {
    const item = document.createElement("span");
    item.textContent = run;
    item.style.color = PALETTE[index % PALETTE.length];
    legend.appendChild(item);
  });
  document.getElementById("charts").innerHTML = data.keys
    .map(key => drawChart(key, data.series[key] || {}))
    .join("");
}

async function loadMetricsTab() {
  const runs = (await api("/manager/api/runs")).runs;
  const pick = document.getElementById("runPick");
  pick.replaceChildren();
  const plotSelect = document.getElementById("plotRun");
  plotSelect.replaceChildren();
  if (!selectedRuns.length && runs.length) selectedRuns = [runs[0].name];
  for (const run of runs) {
    const label = document.createElement("label");
    const box = document.createElement("input");
    box.type = "checkbox";
    box.checked = selectedRuns.includes(run.name);
    box.addEventListener("change", () => {
      selectedRuns = box.checked
        ? [...selectedRuns, run.name]
        : selectedRuns.filter(name => name !== run.name);
      refreshCharts();
    });
    label.append(box, document.createTextNode(
      `${run.name} (${run.first_iteration}–${run.last_iteration})`));
    pick.appendChild(label);
    const option = document.createElement("option");
    option.value = option.textContent = run.name;
    plotSelect.appendChild(option);
  }
  refreshCharts();
  refreshTensorBoard();
}

async function refreshTensorBoard() {
  try {
    const status = await api("/manager/api/tensorboard");
    document.getElementById("tbState").textContent = !status.available
      ? "not installed" : status.running ? "running" : "stopped";
    const button = document.getElementById("tbBtn");
    button.textContent = status.running ? "Stop" : "Start";
    button.disabled = !status.available;
    const link = document.getElementById("tbLink");
    link.hidden = !status.running;
    if (status.url) link.href = status.url;
  } catch (error) { /* transient */ }
}

document.getElementById("tbBtn").addEventListener("click", async () => {
  const running =
    document.getElementById("tbBtn").textContent === "Stop";
  try {
    document.getElementById("toolMsg").textContent = "";
    await api("/manager/api/tensorboard",
              { action: running ? "stop" : "start" });
  } catch (error) {
    document.getElementById("toolMsg").textContent = error.message;
  }
  setTimeout(refreshTensorBoard, 500);
});

document.getElementById("plotBtn").addEventListener("click", async () => {
  const run = document.getElementById("plotRun").value;
  if (!run) return;
  const images = document.getElementById("plotImgs");
  document.getElementById("toolMsg").textContent = "";
  images.replaceChildren();
  try {
    const result = await api("/manager/api/plots", { run: run });
    for (const file of result.files) {
      const img = document.createElement("img");
      img.src = `/manager/plots/${run}/${file}?t=${Date.now()}`;
      images.appendChild(img);
    }
  } catch (error) {
    document.getElementById("toolMsg").textContent = error.message;
  }
});

/* ---------- Storage tab ---------- */
function storageSay(text, cls) {
  const box = document.getElementById("storageMsg");
  box.textContent = text;
  box.style.color = cls === "error" ? "#e08f8f" : "#8fd08f";
}

function deleteCell(kind, name) {
  const cell = document.createElement("td");
  const button = document.createElement("button");
  button.textContent = "Delete";
  button.className = "danger";
  button.addEventListener("click", () => {
    const wrap = document.createElement("span");
    wrap.className = "confirm-inline";
    const input = document.createElement("input");
    input.placeholder = `type "${name}" to confirm`;
    const go = document.createElement("button");
    go.textContent = "Confirm";
    go.className = "danger";
    go.addEventListener("click", async () => {
      try {
        await api("/manager/api/delete",
                  { kind: kind, name: name, confirm: input.value });
        storageSay(`Deleted ${name}.`);
        loadStorageTab();
      } catch (error) {
        storageSay(error.message, "error");
      }
    });
    const cancel = document.createElement("button");
    cancel.textContent = "Cancel";
    cancel.addEventListener("click", () => loadStorageTab());
    wrap.append(input, go, cancel);
    cell.replaceChildren(wrap);
    input.focus();
  });
  cell.appendChild(button);
  return cell;
}

function rowOf(cells) {
  const row = document.createElement("tr");
  for (const cell of cells) {
    if (cell instanceof HTMLElement) { row.appendChild(cell); continue; }
    const td = document.createElement("td");
    td.textContent = cell;
    row.appendChild(td);
  }
  return row;
}

function headerOf(names) {
  const row = document.createElement("tr");
  for (const name of names) {
    const th = document.createElement("th");
    th.textContent = name;
    row.appendChild(th);
  }
  return row;
}

async function showInfo(name) {
  const card = document.getElementById("infoCard");
  const box = document.getElementById("infoBox");
  card.hidden = false;
  box.textContent = "Loading…";
  try {
    const info = await api(
      "/manager/api/model-info?name=" + encodeURIComponent(name));
    box.replaceChildren();
    const kv = document.createElement("div");
    kv.className = "kv";
    const pairs = [["name", info.name], ["kind", info.kind],
      ["size", info.size_mb + " MB"]];
    if (info.kind === "model") {
      pairs.push(
        ["board", `${info.board_size}x${info.board_size}, `
                  + `win ${info.win_length}`],
        ["network", `${info.hidden_channels} ch x `
                    + `${info.num_blocks} blocks`],
        ["parameters", info.parameters.toLocaleString()],
        ["format", "v" + info.format_version]);
      if (info.total_iterations) {
        pairs.push(["iterations trained", info.total_iterations]);
      }
    }
    for (const [key, value] of pairs) {
      const k = document.createElement("span"); k.textContent = key;
      const v = document.createElement("span"); v.textContent = value;
      kv.append(k, v);
    }
    box.appendChild(kv);
    if (info.note) {
      const note = document.createElement("p");
      note.textContent = info.note;
      note.style.color = "#7d7466";
      box.appendChild(note);
    }
    for (const entry of info.trained_by || []) {
      const heading = document.createElement("h4");
      heading.style.cssText =
        "margin:14px 0 2px;font-size:12.5px;color:#beb4a0;";
      heading.textContent = `run ${entry.run}`
        + (entry.iterations
           ? ` (iterations ${entry.iterations[0]}–${entry.iterations[1]})`
           : "")
        + (entry.resumed ? " — resumed" : "");
      box.appendChild(heading);
      const options = document.createElement("div");
      options.className = "kv";
      for (const [key, value] of Object.entries(entry.options || {})) {
        const k = document.createElement("span"); k.textContent = key;
        const v = document.createElement("span"); v.textContent = value;
        options.append(k, v);
      }
      box.appendChild(options);
    }
  } catch (error) {
    box.textContent = "Error: " + error.message;
  }
}

async function loadStorageTab() {
  const data = await api("/manager/api/storage");
  const runsTable = document.getElementById("runsTable");
  runsTable.replaceChildren(
    headerOf(["run", "iterations", "size", "modified", ""]));
  for (const run of data.runs) {
    const iterations = run.first_iteration
      ? `${run.first_iteration}–${run.last_iteration}` : "—";
    runsTable.appendChild(rowOf([
      run.name, iterations, run.size_mb + " MB",
      new Date(run.modified * 1000).toLocaleString(),
      deleteCell("run", run.name),
    ]));
  }
  const ckptTable = document.getElementById("ckptTable");
  ckptTable.replaceChildren(
    headerOf(["file", "kind", "size", "modified", "", ""]));
  for (const item of data.checkpoints) {
    const infoCell = document.createElement("td");
    const infoBtn = document.createElement("button");
    infoBtn.textContent = "Info";
    infoBtn.addEventListener("click", () => showInfo(item.name));
    infoCell.appendChild(infoBtn);
    ckptTable.appendChild(rowOf([
      item.name, item.kind, item.size_mb + " MB",
      new Date(item.modified * 1000).toLocaleString(),
      infoCell, deleteCell("checkpoint", item.name),
    ]));
  }
}

/* ---------- Tabs & boot ---------- */
function switchTab(name) {
  for (const pane of document.querySelectorAll(".tabpane")) {
    pane.hidden = pane.id !== "tab-" + name;
  }
  for (const tab of document.querySelectorAll("nav .tab")) {
    tab.classList.toggle("active", tab.dataset.tab === name);
  }
  if (name === "metrics") loadMetricsTab();
  if (name === "storage") { loadStorageTab(); }
}

for (const tab of document.querySelectorAll("nav .tab")) {
  tab.addEventListener("click", event => {
    event.preventDefault();
    switchTab(tab.dataset.tab);
  });
}

async function boot() {
  const [options, states] = await Promise.all([
    api("/manager/api/options"),
    api("/manager/api/states"),
  ]);
  schema = options.options;
  stateFiles = states.states;
  buildForm();
  refreshStatus();
  setInterval(refreshStatus, 3000);
}
boot();
</script>
